<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>점검 중 - 아글라이아 연구소</title>
    <link rel="icon" type="image/png" href="/storage/Common/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background-color: #333;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .navbar-container {
            display: flex;
            align-items: center;
            padding: 0 20px;
            max-width: 1200px;
            width: 100%;
        }

        .site-logo-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .site-logo {
            height: 32px;
            width: auto;
        }

        .site-title {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .maintenance-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .maintenance-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .info-box {
            background-color: #d1ecf1;
            border: 1px solid #17a2b8;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 25px;
            color: #0c5460;
        }

        .info-box h3 {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .info-box p {
            font-size: 14px;
            line-height: 1.8;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #444;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: #333;
            color: #fff;
        }

        /* Footer */
        .site-footer {
            background-color: #000;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }

        .footer-content p {
            margin: 5px 0;
            font-size: 14px;
        }

        /* Mobile */
        @media (max-width: 599px) {
            .maintenance-icon {
                font-size: 60px;
            }

            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 14px;
            }

            .maintenance-container {
                padding: 25px 20px;
                margin: 0 10px;
            }

            .site-title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="site-logo-link">
                <img src="https://aglaia.dev/storage/Common/logo_white_header.png" alt="Logo" class="site-logo">
                <span class="site-title">아글라이아 연구소</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="maintenance-container">
            <div class="maintenance-icon">🔧</div>

            <h1>서비스 점검 중입니다</h1>

            <p class="subtitle">
                더 나은 서비스를 위해 시스템 점검을 진행하고 있습니다.<br>
                잠시 후 다시 방문해 주세요.
            </p>

            <div class="info-box">
                <h3>📢 점검 안내</h3>
                <p>
                    점검 시간: 추후 공지<br>
                    점검 내용: 시스템 업데이트 및 최적화
                </p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <p>© 2024 아글라이아 연구소. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
